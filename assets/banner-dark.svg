<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="rieth.io">
  <style>
    .bg { fill: #0B1B2A; }
    .ink { fill: #FFFFFF; }
    .blue { fill: #7FB8DC; }
    .meta { fill: #8795A4; }
    .rule { stroke: #1A2F45; }

    .br-l { transform: translateX(-60px); transform-origin: 0% 50%; animation: brInL 0.9s cubic-bezier(0.2,0.9,0.3,1) both; }
    .br-r { transform: translateX(60px); transform-origin: 100% 50%; animation: brInR 0.9s cubic-bezier(0.2,0.9,0.3,1) both; }

    @keyframes brInL { 0% { transform: translateX(-60px); opacity: 0; } 55% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(0); opacity: 1; } }
    @keyframes brInR { 0% { transform: translateX(60px); opacity: 0; } 55% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(0); opacity: 1; } }

    .r-draw {
      fill: #FFFFFF;
      stroke: #FFFFFF;
      stroke-width: 2;
      stroke-dasharray: 1100;
      stroke-dashoffset: 1100;
      fill-opacity: 0;
      animation: drawR 2.4s cubic-bezier(0.7,0,0.3,1) 0.5s forwards;
    }
    @keyframes drawR {
      0%   { stroke-dashoffset: 1100; fill-opacity: 0; }
      30%  { stroke-dashoffset: 1100; fill-opacity: 0; }
      75%  { stroke-dashoffset: 0; fill-opacity: 0; }
      95%  { stroke-dashoffset: 0; fill-opacity: 1; }
      100% { stroke-dashoffset: 0; fill-opacity: 1; }
    }

    .fade-eyebrow { opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.2,0.9,0.3,1) 1.2s forwards; }
    .fade-word    { opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.2,0.9,0.3,1) 1.8s forwards; }
    .fade-dot     { opacity: 0; animation: dotPop 0.5s cubic-bezier(0.2,1.5,0.3,1) 2.4s forwards; transform-origin: center; }
    .fade-io      { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.2,0.9,0.3,1) 2.5s forwards; }
    .fade-sub     { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.2,0.9,0.3,1) 2.8s forwards; }
    .fade-foot    { opacity: 0; animation: fadeIn 0.6s ease-out 3.2s forwards; }

    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes dotPop { 0% { opacity: 0; transform: scale(0.4); } 100% { opacity: 1; transform: scale(1); } }

    @media (prefers-reduced-motion: reduce) {
      .br-l, .br-r, .r-draw, .fade-eyebrow, .fade-word, .fade-dot, .fade-io, .fade-sub, .fade-foot {
        animation: none !important; opacity: 1 !important; transform: none !important;
        stroke-dashoffset: 0 !important; fill-opacity: 1 !important;
      }
    }
  </style>

  <rect class="bg" width="1200" height="300"/>

  <g transform="translate(80,50)">
    <g class="br-l" fill="none" stroke="#7FB8DC" stroke-width="10" stroke-linecap="butt" stroke-linejoin="miter">
      <path d="M24 28 L10 28 L10 172 L24 172"/>
    </g>
    <g class="br-r" fill="none" stroke="#7FB8DC" stroke-width="10" stroke-linecap="butt" stroke-linejoin="miter">
      <path d="M196 28 L210 28 L210 172 L196 172"/>
    </g>
    <g transform="translate(8,0)">
      <path class="r-draw" d="M48 36 L48 164 L74 164 L74 120 L98 120 L132 164 L166 164 L132 118 C150 112 160 96 160 76 C160 52 142 36 114 36 Z M74 60 L110 60 C124 60 134 66 134 80 C134 94 124 100 110 100 L74 100 Z"/>
    </g>
  </g>

  <text class="fade-eyebrow meta" x="340" y="118" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" letter-spacing="2.5">CONSULTING · ENGINEERING · HOMELAB</text>

  <text x="340" y="196" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-1">
    <tspan class="fade-word ink">rieth</tspan><tspan class="fade-dot blue">.</tspan><tspan class="fade-io ink">io</tspan>
  </text>

  <text class="fade-sub meta" x="340" y="232" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="0.7">Brian Rieth — selbstständig &amp; bei Altenbach GmbH u. Cie</text>

  <g class="fade-foot">
    <line class="rule" x1="80" y1="262" x2="1120" y2="262" stroke-width="1"/>
    <text class="meta" x="80" y="285" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="0.55">SINCE 2020</text>
    <text class="meta" x="1120" y="285" text-anchor="end" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="0.55">RIETH.IO</text>
  </g>
</svg>
